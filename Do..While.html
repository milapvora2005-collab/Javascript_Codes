<html>
	<head>
		<title>Do..While Loop</title>
	</head>
	<body>
		<p id="a1"> </p>
		<script>
			var a=0;
			var p=document.getElementById("a1");
			while(a<10)
			{
				p.innerHTML+="<BR>"+a;
				a++
			}
			p.innerHTML+="<HR>";
			var i=0;
			do{
				p.innerHTML+="<BR>"+i;
				i++;
			}
			while(i<10);
		</script>
	</body>
</html>
