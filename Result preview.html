<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Preview</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Result Preview</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Sem</th>
            <th>Sr No</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td rowspan="4"><input type="text" placeholder="Enter Name"></td>
            <td rowspan="4">
                <select>
                    <option value="MSC CA&IT">MSC CA&IT</option>
                    <option value="PGDCA">PGDCA</option>
                    <option value="MSC IT">MSC IT</option>
                    <option value="BS">BS</option>
                </select>
            </td>
            <td rowspan="4"><input type="text" placeholder="Enter Sem"></td>
            <td>1</td>
            <td>Python</td>
            <td><input type="text" placeholder="Enter Marks"></td>
        </tr>
        <tr>
            <td>2</td>
            <td>JS</td>
            <td><input type="text" placeholder="Enter Marks"></td>
        </tr>
        <tr>
            <td>3</td>
            <td><input type="text" placeholder="Enter Subject"></td>
            <td><input type="text" placeholder="Enter Marks"></td>
        </tr>
        <tr>
            <td>4</td>
            <td><input type="text" placeholder="Enter Subject"></td>
            <td><input type="text" placeholder="Enter Marks"></td>
        </tr>
        <tr>
            <td colspan="5">Total</td>
            <td><input type="text" placeholder="Total"></td>
        </tr>
        <tr>
            <td colspan="5">Average</td>
            <td><input type="text" placeholder="Average"></td>
        </tr>
        <tr>
            <td colspan="5">Grade</td>
            <td><input type="text" placeholder="Grade"></td>
        </tr>
    </table>
	<center><button type=""submit>submit</button></center>
</body>
</html>
