<!DOCTYPE HTML>
<html>
	<head>
		<title>IF CONDITION STATEMENT</title>
	</head>
	<body>
		<p id="yd"></p>
		<script>
			var a=prompt("Enter any number: ");
			var b=prompt("Enter any number: ");
			let yd=document.getElementById("yd");
			
			if(a==b)
			{
				yd.innerHTML="same &#128540";
			}
			else if(a>b)
			{
				yd.innerHTML="a is greater &#128534";
			}
			else
			{
				yd.innerHTML="b is greater &#128561";
			}
		</script>
	</body>
</html>
