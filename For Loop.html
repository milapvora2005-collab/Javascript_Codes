<html>
	<head>
		<title>For While Loop</title>
	</head>
	<body>
		<p id="a1"> </p>
		<script>
			var a=0;
			var p=document.getElementById("a1");
			var i=0;
			do{
				p.innerHTML+="<BR>"+i;
				i++;
			}
			while(i<10);
			for(var j=0;j<10;j++)
			{
				p.innerHTML+="<BR>"+j;
			}
		</script>
	</body>
</html>
